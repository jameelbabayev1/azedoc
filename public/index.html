<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#030712">
  <meta name="description" content="AZEDOC — Professional Clinical AI Platform for Hospital Doctors">
  <title>AZEDOC — Clinical AI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#030712;font-family:'Inter',sans-serif;overflow:hidden}
    .loading-screen{position:fixed;inset:0;background:#030712;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px;transition:opacity .5s ease}
    .loading-logo{display:flex;align-items:center;gap:3px;font-size:40px;font-weight:900;letter-spacing:-2px}
    .ll-a{background:linear-gradient(135deg,#00d4ff,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .ll-rest{color:#f9fafb}
    .loading-tagline{font-size:12px;color:#4b5563;text-transform:uppercase;letter-spacing:3px;font-weight:500}
    .loading-bar-wrap{width:220px;height:2px;background:rgba(255,255,255,.06);border-radius:1px;overflow:hidden;margin-top:4px}
    .loading-bar{height:100%;background:linear-gradient(90deg,#00d4ff,#7c3aed);width:0%;transition:width .4s ease;border-radius:1px}
    .loading-msg{font-size:11px;color:#374151;font-family:'JetBrains Mono',monospace;min-height:16px}
    .app-shell{display:none;height:100vh;width:100vw}
  </style>
</head>
<body>

<canvas id="three-canvas" style="position:fixed;inset:0;z-index:0;pointer-events:none"></canvas>

<!-- Loading -->
<div class="loading-screen" id="loading-screen">
  <div class="loading-logo">
    <span class="ll-a">A</span><span class="ll-rest">ZEDOC</span>
  </div>
  <div class="loading-tagline">Clinical AI Platform</div>
  <div class="loading-bar-wrap">
    <div class="loading-bar" id="loading-bar"></div>
  </div>
  <div class="loading-msg" id="loading-msg">Initializing...</div>
</div>

<!-- App Shell -->
<div class="app-shell" id="app-shell">

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-logo" id="sidebar-logo">
        <div class="logo-mark">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="8" fill="url(#lg1)"/>
            <path d="M8 14h4l2-4 4 8 2-4h4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <defs><linearGradient id="lg1" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse"><stop stop-color="#00d4ff"/><stop offset="1" stop-color="#7c3aed"/></linearGradient></defs>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-name">AZEDOC</span>
          <span class="logo-sub">Clinical AI</span>
        </div>
      </div>
      <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="sidebar-nav" id="sidebar-nav"></div>

    <div class="sidebar-footer" id="sidebar-footer"></div>
  </nav>

  <!-- Main -->
  <div class="main-area" id="main-area">
    <header class="topbar" id="topbar">
      <div class="tb-left">
        <button class="btn-icon tb-hamburger" id="tb-hamburger">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="3.5" width="14" height="1.5" rx=".75" fill="currentColor"/><rect x="1" y="7.25" width="14" height="1.5" rx=".75" fill="currentColor"/><rect x="1" y="11" width="14" height="1.5" rx=".75" fill="currentColor"/></svg>
        </button>
        <div class="tb-ward" id="tb-ward">Ward 7 — General Medicine</div>
        <div class="tb-shift-badge">
          <span class="shift-live-dot"></span>
          <span>Shift Active</span>
        </div>
      </div>

      <div class="tb-center">
        <div class="search-wrap">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/><path d="M10 10L12.5 12.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <input type="text" class="search-input" id="search-input" placeholder="Search patients, diagnoses, drugs...">
          <span class="search-kbd">⌘K</span>
        </div>
      </div>

      <div class="tb-right">
        <button class="btn-icon tb-notif" id="tb-notif" title="Alerts">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="notif-badge" id="notif-badge">3</span>
        </button>
        <div class="tb-time" id="tb-time">--:--</div>
        <div class="doctor-avatar" id="doctor-avatar" title="Dr. Sarah Martinez">SM</div>
      </div>
    </header>

    <main class="page-content" id="page-content">
      <!-- Dynamic content injected by app.js -->
    </main>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>
<!-- Modal root -->
<div id="modal-root"></div>

<!-- Icons registry -->
<script>
window.ICONS = {

</script>

<!-- CDNs -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>

<!-- App scripts (dependency order) -->
<script src="/js/data.js"></script>
<script src="/js/api.js"></script>
<script src="/js/charts.js"></script>
<script src="/js/three-bg.js"></script>
<script src="/js/app.js"></script>

<!-- Loading orchestration -->
<script>
(function() {
  const bar = document.getElementById('loading-bar');
  const msg = document.getElementById('loading-msg');
  const steps = [
    [15, 'Loading patient registry...'],
    [35, 'Initializing AI models...'],
    [55, 'Connecting to ward systems...'],
    [70, 'Calibrating NEWS2 engine...'],
    [85, 'Preparing shift intelligence...'],
    [100, 'AZEDOC ready'],
  ];
  let i = 0;
  const iv = setInterval(() => {
    if (i < steps.length) {
      bar.style.width = steps[i][0] + '%';
      msg.textContent = steps[i][1];
      i++;
    } else {
      clearInterval(iv);
      setTimeout(() => {
        const ls = document.getElementById('loading-screen');
        ls.style.opacity = '0';
        setTimeout(() => {
          ls.style.display = 'none';
          document.getElementById('app-shell').style.display = 'flex';
          if (window.App) window.App.init();
        }, 500);
      }, 400);
    }
  }, 320);
})();
</script>
</body>
</html>
